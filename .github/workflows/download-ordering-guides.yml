name: Fortinet Ordering Guides

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PDFs
        run: bash scripts/download-og.sh ordering-guides/pdf

      - name: Commit PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ordering-guides/pdf/
          if git diff --staged --quiet; then
            echo "No changes — PDFs already up to date."
          else
            git commit -m "chore: download ordering guides PDFs [$(date -u +%Y-%m-%d)]"
            git push
          fi

  convert:
    runs-on: ubuntu-latest
    needs: download
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest commits
        run: git pull origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install markitdown
        run: pip install markitdown

      - name: Convert PDFs to Markdown
        run: bash scripts/convert-og.sh ordering-guides/pdf ordering-guides/markdown

      - name: Commit Markdown
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ordering-guides/markdown/
          if git diff --staged --quiet; then
            echo "No changes — Markdown already up to date."
          else
            git commit -m "chore: convert ordering guides to markdown [$(date -u +%Y-%m-%d)]"
            git push
          fi
