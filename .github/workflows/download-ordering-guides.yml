name: Download Fortinet Ordering Guides

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run download script
        run: bash scripts/download-og.sh ordering-guides/pdf

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ordering-guides/pdf/
          if git diff --staged --quiet; then
            echo "No changes — guides are already up to date."
          else
            git commit -m "chore: update Fortinet ordering guides [$(date -u +%Y-%m-%d)]"
            git push
          fi
